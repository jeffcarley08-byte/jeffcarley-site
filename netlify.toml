# Jeff Carley Leadership — Netlify Configuration

# RESOURCE PAGES
[[redirects]]
  from = "/climb-map"
  to = "/pages/climb-map.html"
  status = 200

[[redirects]]
  from = "/climb-map/"
  to = "/pages/climb-map.html"
  status = 200

[[redirects]]
  from = "/5-questions"
  to = "/pages/5-questions.html"
  status = 200

[[redirects]]
  from = "/5-questions/"
  to = "/pages/5-questions.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to = "/pages/thank-you.html"
  status = 200

[[redirects]]
  from = "/thank-you/"
  to = "/pages/thank-you.html"
  status = 200

[[redirects]]
  from = "/climb-map-worksheet"
  to = "/pages/thank-you.html"
  status = 200

[[redirects]]
  from = "/climb-map-worksheet/"
  to = "/pages/thank-you.html"
  status = 200

# SECURITY HEADERS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/pages/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
