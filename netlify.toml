# Jeff Carley Leadership — Netlify Configuration

# ─── WORDPRESS MEDIA PASSTHROUGH ───────────────────────────────────────
# Proxies /wp-content/ requests to WordPress.com's Jetpack CDN
# Your media files live at i0.wp.com — this passes requests through

[[redirects]]
  from = "/wp-content/uploads/*"
  to = "https://i0.wp.com/jeffcarleyleadership.com/wp-content/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "https://jeffcarleyleadership.wordpress.com/wp-content/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-admin"
  to = "https://wordpress.com/home/jeffcarleyleadership.com"
  status = 301
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "https://wordpress.com/home/jeffcarleyleadership.com"
  status = 301
  force = true

